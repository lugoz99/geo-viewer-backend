services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geovisor_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: geovisor_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    # Sobreescribe el CMD del Dockerfile para desarrollo con --reload
    # En produccion quitar esta linea y usa el CMD del Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
